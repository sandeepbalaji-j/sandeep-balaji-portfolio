@keyframes fadeIn  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

.fade-in   { animation: fadeIn  .2s ease-out both; }
.slide-up  { animation: slideUp .25s ease-out both; }
.spinner   { animation: spin .85s linear infinite; }
.backdrop  { animation: backdropIn .15s ease-out both; }

::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }

/* ─── PRIMITIVES ─────────────────────────────────────────── */
const Btn = ({ children, v = 'primary', s = 'md', className = '', onClick, disabled }) => {
  const base = 'inline-flex items-center justify-center gap-1.5 font-semibold rounded-[8px] transition-all duration-150 active:scale-[.98] disabled:opacity-40 disabled:pointer-events-none';
  const variants = {
    primary: 'bg-violet-600 hover:bg-violet-700 text-white shadow-sm shadow-violet-200',
    outline: 'border border-gray-200 bg-white hover:bg-gray-50 hover:border-gray-300 text-gray-700',
    ghost:   'text-gray-600 hover:bg-gray-100 hover:text-gray-800',
    danger:  'bg-red-500 hover:bg-red-600 text-white',
  };
  const sizes = { sm: 'px-3 py-1.5 text-[12px]', md: 'px-4 py-2 text-[13px]', lg: 'px-5 py-2.5 text-[13.5px]' };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`${base} ${variants[v]} ${sizes[s]} ${className}`}>
      {children}
    </button>
  );
};

    green:   'bg-emerald-50 text-emerald-700',

    violet:  'bg-violet-50 text-violet-700',

  };

    <span className={`inline-flex items-center gap-1 px-2 py-[3px] rounded-full text-[11.5px] font-medium ${colors[color]}`}>

  );
};

/* ─── SYNCING MODAL ──────────────────────────────────────── */
const SyncingModal = ({ onDone }) => {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    let p = 0;
    const iv = setInterval(() => { p += Math.random() * 8 + 3; if (p > 99) p = 99; setPct(Math.round(p)); }, 60);
    const done = setTimeout(() => { clearInterval(iv); setPct(100); setTimeout(onDone, 300); }, 2000);
    return () => { clearInterval(iv); clearTimeout(done); };
  }, []);

  return (
    <div className="px-8 py-10 text-center">
      <div className="flex justify-center mb-5">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" className="spinner">
          <circle cx="24" cy="24" r="19" stroke="#F1F5F9" strokeWidth="2.5" />
          <path d="M43 24 A19 19 0 0 0 24 5" stroke="#7C3AED" strokeWidth="2.5" strokeLinecap="round" />
        </svg>
      </div>
      <h3 className="text-[15px] font-semibold text-gray-900 mb-1 tracking-[-0.02em]">Syncing 12 bills to Tally</h3>
      <p className="text-[12.5px] text-gray-400 mb-5">Don't close this window</p>
      <div className="h-[5px] bg-gray-100 rounded-full overflow-hidden">
        <div className="h-full bg-violet-500 rounded-full transition-all duration-100" style={{ width: `${pct}%` }} />
      </div>
      <p className="text-[11.5px] text-gray-400 mt-2">{pct}%</p>
    </div>
  );
};

/* ─── MAIN APP ───────────────────────────────────────────── */
const App = () => {

  const [bannerVisible, setBanner] = useState(true);
  const [synced, setSynced] = useState(false);

  const openSync = () => { if (selected.size > 0) setModal('presync'); };
  const confirmSync = () => { setModal('syncing'); };
  const syncDone = () => { setSynced(true); setModal('complete'); };

  const toggleRow = id => setSelected(s => {
    const ns = new Set(s);
    ns.has(id) ? ns.delete(id) : ns.add(id);
    return ns;
  });

  const selCount = selected.size;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar />

      {/* main content */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#F8FAFC' }}>

        {/* AI banner */}

              <SparkleIcon size={13} />

              <Btn v="primary" s="sm" onClick={() => setModal('balance')}>Review</Btn>

                <I d={ic.x} size={14} />

            <p className="text-[11.5px] text-gray-400 mb-0.5">Accounts Payable</p>

            <button className="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 transition-colors">
              <I d={ic.search} size={16} />

        </div>

        {/* summary cards */}
        <div className="grid grid-cols-3 gap-4 px-6 pt-5 pb-4">
          {[
            { label: 'Total Outstanding', val: '₹8,30,100', sub: 'across 10 vendors',       color: 'text-gray-900' },
            { label: 'Overdue',           val: '₹4,87,600', sub: '3 vendors need attention', color: 'text-red-600'  },
            { label: 'Due in 7 Days',     val: '₹90,300',   sub: '2 bills approaching',      color: 'text-amber-600'},
          ].map(card => (
            <div key={card.label} className="bg-white rounded-xl border border-gray-200 px-4 py-4 shadow-sm">
              <p className="text-[12px] text-gray-400 font-medium mb-1">{card.label}</p>

    </div>
  );
};
