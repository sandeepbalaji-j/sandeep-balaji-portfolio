<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinOps · Tally Connector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;450;500;600&family=Schibsted+Grotesk:wght@400..700&display=swap">
<style>
:root{
  --brand:#0d5c63; --brand-hover:#0a4a50; --brand-tint:#e7f1f1;
  --logo-bg:#15503F;
  --surface:#ffffff; --page:#f5f6f8; --panel:#f3f1ee; --panel-2:#e9e7e2;
  --ink:#1c1917; --muted-ink:#6b6560; --faint:#9aa1ac;
  --line:rgba(28,25,23,.10); --line-2:rgba(28,25,23,.065);
  --danger:#b42318; --danger-dot:#e5484d; --danger-tint:#fbeceb;
  --warning:#b45309; --warning-dot:#f59e0b; --warning-tint:#fbf1e3;
  --success:#0d6b45; --success-dot:#16a34a; --success-tint:#e8f2e6;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --disp:'Schibsted Grotesk',var(--sans);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --shadow-card:0 1px 2px rgba(28,25,18,.04), 0 2px 6px rgba(28,25,18,.04), 0 6px 20px -6px rgba(28,25,18,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink);
  min-height:100vh; display:flex; align-items:flex-start; justify-content:center;
  padding:30px 0;
  background:#e9eaec;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.widget{
  width:360px; background:var(--surface);
  border:1px solid var(--line); border-radius:16px; overflow:hidden;
  box-shadow:var(--shadow-card), 0 22px 48px -16px rgba(28,25,18,.22);
}
/* ── title bar ── */
.tbar{ display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px 11px; border-bottom:1px solid var(--line-2); }
.tbar-l{ display:flex; align-items:center; gap:9px; min-width:0; }
.logo{ flex:none; }
.brandname{ font-family:var(--disp); font-weight:700; font-size:14.5px; letter-spacing:-.02em; color:var(--ink); }
.org{ display:inline-flex; align-items:center; gap:5px; margin-left:1px;
  font-size:11px; color:var(--muted-ink); background:var(--panel);
  padding:2.5px 8px; border-radius:999px; white-space:nowrap; }
.org .odot{ width:5px; height:5px; border-radius:50%; background:var(--success-dot); }
.winbtns{ display:flex; gap:1px; flex:none; }
.winbtns i{ width:22px; height:22px; border-radius:6px; display:flex; align-items:center;
  justify-content:center; color:var(--faint); }
.winbtns i:hover{ background:var(--panel); color:var(--muted-ink); }
/* ── status strip ── */
.srow{ display:flex; align-items:center; justify-content:space-between;
  padding:11px 16px 0; }
.state-tag{ display:inline-flex; align-items:center; gap:6px;
  font-family:var(--mono); font-size:10.5px; font-weight:500;
  letter-spacing:.13em; text-transform:uppercase; }
.state-tag .sdot{ width:6px; height:6px; border-radius:50%; }
.st-green .state-tag{ color:var(--success); } .st-green .sdot{ background:var(--success-dot); }
.st-amber .state-tag{ color:var(--warning); } .st-amber .sdot{ background:var(--warning-dot); }
.st-red   .state-tag{ color:var(--danger);  } .st-red   .sdot{ background:var(--danger-dot); }
.srow .stamp{ font-family:var(--mono); font-size:10.5px; color:var(--faint); letter-spacing:.04em; }
/* ── main head ── */
.wbody{ padding:12px 16px 16px; }
.mhead{ display:flex; align-items:flex-start; gap:12px; margin-top:8px; }
.mico{ width:40px; height:40px; border-radius:11px; flex:none;
  display:flex; align-items:center; justify-content:center; }
.mi-green{ background:var(--success-tint); color:var(--success); }
.mi-amber{ background:var(--warning-tint); color:var(--warning); }
.mi-red{ background:var(--danger-tint); color:var(--danger); }
.mtitle{ font-family:var(--disp); font-weight:600; font-size:17.5px;
  letter-spacing:-.025em; line-height:1.15; color:var(--ink); }
.msub{ font-size:12.5px; color:var(--muted-ink); margin-top:3px; line-height:1.4; }
.msub b{ color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; }
/* ── reconciliation bar ── */
.reco{ margin-top:16px; }
.reco-track{ height:6px; border-radius:999px; background:var(--panel-2);
  overflow:hidden; display:flex; }
.reco-track > i{ height:100%; display:block; }
.seg-green{ background:var(--success-dot); }
.seg-amber{ background:var(--warning-dot); }
.seg-red{ background:var(--danger-dot); }
.reco-cap{ display:flex; align-items:center; justify-content:space-between; margin-top:7px; }
.reco-cap .k{ font-size:11px; color:var(--muted-ink); }
.reco-cap .v{ font-family:var(--mono); font-size:11px; color:var(--ink); letter-spacing:.02em; }
/* ── stats (green) ── */
.stats{ display:flex; margin-top:15px; border-top:1px solid var(--line-2);
  border-bottom:1px solid var(--line-2); }
.stat{ flex:1; text-align:center; padding:12px 4px 11px; }
.stat + .stat{ border-left:1px solid var(--line-2); }
.stat .v{ font-family:var(--mono); font-size:15px; font-weight:500; letter-spacing:-.01em; }
.stat .l{ font-size:10.5px; color:var(--muted-ink); margin-top:4px; letter-spacing:.01em; }
.v-teal{ color:var(--brand); } .v-green{ color:var(--success); } .v-ink{ color:var(--ink); }
/* ── issue list (amber/red) ── */
.ilist{ margin-top:14px; border-top:1px solid var(--line-2); }
.irow{ display:flex; align-items:center; gap:11px; padding:10px 0;
  border-bottom:1px solid var(--line-2); }
.icount{ display:inline-flex; align-items:center; gap:7px; flex:none; min-width:34px;
  font-family:var(--mono); font-size:12px; font-weight:500; color:var(--ink); }
.idot{ width:6px; height:6px; border-radius:50%; flex:none; }
.d-amber{ background:var(--warning-dot); } .d-red{ background:var(--danger-dot); }
.ilabel{ font-size:12.5px; color:var(--ink); line-height:1.3; }
.ihint{ margin-left:auto; flex:none; font-family:var(--mono); font-size:10px;
  letter-spacing:.03em; text-transform:uppercase; color:var(--muted-ink);
  background:var(--panel); padding:3px 7px; border-radius:5px; white-space:nowrap; }
.ihint.warn{ color:var(--warning); background:var(--warning-tint); }
.ihint.err{ color:var(--danger); background:var(--danger-tint); }
/* ── recent activity (green) ── */
.recent{ margin-top:14px; border-top:1px solid var(--line-2); padding-top:12px; }
.recent-h{ display:flex; align-items:center; gap:7px; font-family:var(--mono);
  font-size:9.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint); margin-bottom:8px; }
.recent-h .live{ position:relative; width:6px; height:6px; flex:none; }
.recent-h .live .core{ position:absolute; inset:0; border-radius:50%; background:var(--success-dot); }
.recent-h .live .ring{ position:absolute; inset:0; border-radius:50%; background:var(--success-dot);
  opacity:.5; animation:ping 2.4s ease-out infinite; }
.rrow{ display:flex; align-items:center; gap:11px; padding:5px 0; }
.rrow .rt{ font-family:var(--mono); font-size:11px; color:var(--muted-ink); min-width:56px; }
.rrow .rl{ font-size:12px; color:var(--ink); }
.rrow .rs{ margin-left:auto; display:inline-flex; align-items:center; gap:5px;
  font-size:11px; color:var(--success); }
.rrow .rs .rsdot{ width:5px; height:5px; border-radius:50%; background:var(--success-dot); }
/* ── meta row ── */
.meta{ display:flex; align-items:center; gap:8px; margin-top:14px;
  font-size:11.5px; color:var(--muted-ink); }
.meta .live{ position:relative; width:7px; height:7px; flex:none; }
.meta .live .core{ position:absolute; inset:0; border-radius:50%; background:var(--success-dot); }
.meta .live .ring{ position:absolute; inset:0; border-radius:50%; background:var(--success-dot);
  opacity:.5; animation:ping 2.4s ease-out infinite; }
@keyframes ping{ 0%{transform:scale(1);opacity:.5} 100%{transform:scale(2.6);opacity:0} }
@media (prefers-reduced-motion: reduce){ .meta .live .ring{ animation:none; opacity:0 } }
/* ── actions ── */
.acts{ margin-top:15px; display:flex; flex-direction:column; gap:8px; }
.btn{ height:40px; border-radius:10px; font-family:var(--sans); font-size:13px; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  border:1px solid transparent; transition:background .15s,border-color .15s,color .15s,box-shadow .15s; width:100%; }
.btn svg{ flex:none; }
.btn-primary{ background:var(--brand); color:#fff;
  box-shadow:0 1px 2px rgba(13,92,99,.25), 0 1px 0 rgba(255,255,255,.06) inset; }
.btn-primary:hover{ background:var(--brand-hover); }
.btn-ghost{ background:var(--surface); color:var(--ink); border-color:var(--line); }
.btn-ghost:hover{ background:var(--panel); }
/* ── state switcher ── */
.switch{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; gap:3px; background:var(--surface); border:1px solid var(--line);
  border-radius:999px; padding:4px; box-shadow:var(--shadow-card); z-index:10; }
.switch button{ font-family:var(--mono); font-size:11px; letter-spacing:.02em; border:none;
  background:transparent; color:var(--muted-ink); padding:6px 14px; border-radius:999px; cursor:pointer; }
.switch button.on{ background:var(--ink); color:#fff; }
body.capture .switch{ display:none; }
svg{ display:block; }
</style>
</head>
<body>
<div class="widget" id="widget"></div>

<div class="switch" id="switch">
  <button data-s="green">green</button>
  <button data-s="amber">amber</button>
  <button data-s="red">red</button>
</div>

<script>
const LOGO = `<svg class="logo" viewBox="0 0 28 28" width="24" height="24" role="img" aria-label="FinOps">
  <rect width="28" height="28" rx="6" fill="var(--logo-bg)"/>
  <rect x="8.2" y="7" width="2.9" height="14" rx="1.2" fill="#fff"/>
  <rect x="8.2" y="7" width="11.6" height="2.9" rx="1.45" fill="#fff"/>
  <rect x="8.2" y="12.9" width="8" height="2.9" rx="1.45" fill="#fff"/>
  <rect x="14.3" y="18.1" width="2.9" height="2.9" rx="1.1" fill="#fff"/>
</svg>`;

const IC = {
  check:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  review:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h11M4 18h7"/></svg>',
  alert:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.6 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><circle cx="12" cy="17" r="0.6" fill="currentColor"/></svg>',
  refresh:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 4v5h-5"/></svg>',
  arrow:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg>',
  min:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>',
  ex:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>',
};

const tbar = `
  <div class="tbar">
    <div class="tbar-l">
      ${LOGO}
      <span class="brandname">FinOps</span>
      <span class="org"><span class="odot"></span>Acme Industries</span>
    </div>
    <div class="winbtns"><i>${IC.min}</i><i>${IC.ex}</i></div>
  </div>`;

const views = {
  green: `
    ${tbar}
    <div class="st-green">
      <div class="srow"><span class="state-tag"><span class="sdot"></span>In sync</span><span class="stamp">SYNCED 9:32 PM</span></div>
      <div class="wbody">
        <div class="mhead">
          <div class="mico mi-green">${IC.check}</div>
          <div>
            <div class="mtitle">Books match Tally</div>
            <div class="msub">All <b>48 vouchers</b> reconciled. Nothing waiting.</div>
          </div>
        </div>
        <div class="reco">
          <div class="reco-track"><i class="seg-green" style="width:100%"></i></div>
          <div class="reco-cap"><span class="k">Reconciled with Tally</span><span class="v">48 / 48</span></div>
        </div>
        <div class="stats">
          <div class="stat"><div class="v v-ink">48</div><div class="l">Synced</div></div>
          <div class="stat"><div class="v v-green">100%</div><div class="l">Matched</div></div>
          <div class="stat"><div class="v v-teal">18m</div><div class="l">Next sync</div></div>
        </div>
        <div class="recent">
          <div class="recent-h"><span class="live"><span class="ring"></span><span class="core"></span></span>Watching for drift · last 3 runs</div>
          <div class="rrow"><span class="rt">9:32 PM</span><span class="rl">48 vouchers</span><span class="rs"><span class="rsdot"></span>reconciled</span></div>
          <div class="rrow"><span class="rt">8:12 PM</span><span class="rl">45 vouchers</span><span class="rs"><span class="rsdot"></span>reconciled</span></div>
          <div class="rrow"><span class="rt">6:47 PM</span><span class="rl">51 vouchers</span><span class="rs"><span class="rsdot"></span>reconciled</span></div>
        </div>
        <div class="acts">
          <button class="btn btn-ghost">${IC.refresh}Sync now</button>
        </div>
      </div>
    </div>`,

  amber: `
    ${tbar}
    <div class="st-amber">
      <div class="srow"><span class="state-tag"><span class="sdot"></span>Needs review</span><span class="stamp">SYNCED 9:32 PM</span></div>
      <div class="wbody">
        <div class="mhead">
          <div class="mico mi-amber">${IC.review}</div>
          <div>
            <div class="mtitle">12 bills need review</div>
            <div class="msub"><b>36</b> ready to sync. Clear these first.</div>
          </div>
        </div>
        <div class="reco">
          <div class="reco-track"><i class="seg-green" style="width:75%"></i><i class="seg-amber" style="width:25%"></i></div>
          <div class="reco-cap"><span class="k">Ready to sync</span><span class="v">36 / 48</span></div>
        </div>
        <div class="ilist">
          <div class="irow"><span class="icount"><span class="idot d-amber"></span>7&times;</span><span class="ilabel">Ledger not mapped</span><span class="ihint">suggested</span></div>
          <div class="irow"><span class="icount"><span class="idot d-amber"></span>3&times;</span><span class="ilabel">GST head to confirm</span><span class="ihint">out&#8209;of&#8209;state</span></div>
          <div class="irow"><span class="icount"><span class="idot d-amber"></span>2&times;</span><span class="ilabel">Voucher no. missing</span><span class="ihint">next in series</span></div>
        </div>
        <div class="acts">
          <button class="btn btn-primary">Review in FinOps ${IC.arrow}</button>
          <button class="btn btn-ghost">${IC.refresh}Sync 36 ready</button>
        </div>
      </div>
    </div>`,

  red: `
    ${tbar}
    <div class="st-red">
      <div class="srow"><span class="state-tag"><span class="sdot"></span>Sync failed</span><span class="stamp">SYNCED 9:34 PM</span></div>
      <div class="wbody">
        <div class="mhead">
          <div class="mico mi-red">${IC.alert}</div>
          <div>
            <div class="mtitle">4 vouchers failed to sync</div>
            <div class="msub"><b>12</b> synced. Tally rejected the rest, in its own words.</div>
          </div>
        </div>
        <div class="reco">
          <div class="reco-track"><i class="seg-green" style="width:75%"></i><i class="seg-red" style="width:25%"></i></div>
          <div class="reco-cap"><span class="k">Synced this run</span><span class="v">12 / 16</span></div>
        </div>
        <div class="ilist">
          <div class="irow"><span class="icount"><span class="idot d-red"></span>3&times;</span><span class="ilabel">Ledger not found in Tally</span><span class="ihint warn">fixable</span></div>
          <div class="irow"><span class="icount"><span class="idot d-red"></span>1&times;</span><span class="ilabel">GSTIN missing, RCM ledger required</span><span class="ihint err">action</span></div>
        </div>
        <div class="meta">AP/057, AP/047, AP/010 &middot; +1 more</div>
        <div class="acts">
          <button class="btn btn-primary">Fix in FinOps ${IC.arrow}</button>
          <button class="btn btn-ghost">${IC.refresh}Retry sync</button>
        </div>
      </div>
    </div>`,
};

function render(s){
  document.getElementById('widget').innerHTML = views[s] || views.green;
  document.querySelectorAll('.switch button').forEach(b=>b.classList.toggle('on', b.dataset.s===s));
}
function pick(){ const h=(location.hash||'').replace('#',''); return views[h]?h:'green'; }
document.querySelectorAll('.switch button').forEach(b=>b.addEventListener('click',()=>{ location.hash=b.dataset.s; render(b.dataset.s); }));
if(new URLSearchParams(location.search).get('capture')==='1') document.body.classList.add('capture');
addEventListener('hashchange',()=>render(pick()));
render(pick());
</script>
</body>
</html>
